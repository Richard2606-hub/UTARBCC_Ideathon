<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Details - CCACC Ideathon</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- Material Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
    <style>
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            color: var(--text-gray);
            text-decoration: none;
            font-family: 'Space Grotesk', sans-serif;
            transition: color 0.3s ease;
        }
        .back-btn:hover {
            color: var(--text-light);
        }
        .track-detail-card {
            padding: 3rem;
            border-radius: 1rem;
            background: rgba(26, 26, 36, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            margin-bottom: 4rem;
        }
        .track-detail-header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .track-detail-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }
        .track-detail-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
        }
        .track-detail-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            background: rgba(255, 255, 255, 0.1);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: inline-block;
        }
        .track-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .info-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 1.5rem;
            border-radius: 0.75rem;
        }
        .info-label {
            font-size: 0.875rem;
            color: var(--text-gray);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .info-value {
            font-size: 1.25rem;
            font-weight: 600;
            font-family: 'Space Grotesk', sans-serif;
        }
        .track-description {
            font-size: 1.125rem;
            line-height: 1.7;
            color: var(--text-gray);
            margin-bottom: 2rem;
        }
        .req-list {
            list-style: none;
            padding: 0;
            margin: 0 0 2rem 0;
        }
        .req-list li {
            position: relative;
            padding-left: 1.5rem;
            margin-bottom: 0.75rem;
            color: var(--text-light);
        }
        .req-list li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: currentColor;
        }
        .content-section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--text-light);
        }
    </style>
</head>
<body>
    <!-- Background Elements -->
    <div class="bg-effects">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="grid-overlay"></div>
    </div>

    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">CCACC <span class="highlight">Ideathon</span></a>
            <div class="nav-links">
                <a href="index.html#home" class="nav-link">Home</a>
                <a href="index.html#tracks" class="nav-link active">Tracks</a>
            </div>
            <a href="https://forms.gle/vx3ffcEMEkRuwkrT7" class="btn btn-primary nav-btn" target="_blank" rel="noopener noreferrer">Register Now</a>
        </div>
    </nav>

    <main class="section-padding" style="margin-top: 80px; min-height: 80vh;">
        <div class="container max-w-4xl">
            <a href="javascript:history.back()" class="back-btn">
                <span class="material-symbols-outlined">arrow_back</span> Back to Tracks
            </a>
            
            <div id="track-content" class="track-detail-card reveal">
                <!-- Content will be loaded dynamically -->
                <div class="text-center py-12">
                    <span class="material-symbols-outlined text-4xl mb-4 text-cyan" style="animation: spin 1s linear infinite;">refresh</span>
                    <p>Loading track details...</p>
                </div>
            </div>
        </div>
    </main>
    
    <style>
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>

    <!-- Footer -->
    <footer>
        <div class="container footer-container">
            <div class="copyright text-sm text-gray font-mono">
                © CCACC Ideathon · UNIVERSITI TUNKU ABDUL RAHMAN BLOCKCHAIN CLUB
            </div>
            <div class="social-links">
                <a href="https://www.instagram.com/utar.blockchainclub?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank" class="social-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"></line></svg>
                </a>
            </div>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="script.js"></script>
    
    <script>
        const tracksData = {
            'near_legion': {
                id: 'TRK-01',
                title: 'Near Legion',
                color: 'cyan',
                icon: 'payments',
                pool: 'USD 500',
                submittedBy: 'Near Legion',
                website: 'https://www.ironclaw.com/',
                difficulty: 'Intermediate',
                problemStatement: 'AI agents can now handle user data, credentials, payments, and on-chain actions, but many agent systems still lack strong privacy, permission control, and verifiable execution. This creates risks of data leaks, unauthorized actions, and low user trust.',
                whyThisMatters: 'IronClaw by NEAR helps make autonomous AI safer by running agents in encrypted, secure environments with controlled access to sensitive data and assets. This matters because users and businesses need trusted AI agents before adopting agentic finance, commerce, and Web3 workflows at scale.',
                schedule: [
                    { event: 'Mentorship & Pitching Session (UTAR, Physical)', date: '26 – 27 June' },
                    { event: 'Additional Final Stage', date: 'Not required' }
                ],
                prizes: [
                    { label: '🥇 1st Place', value: 'USD 150' },
                    { label: '🥈 2nd Place', value: 'USD 100' },
                    { label: '🥉 3rd Place', value: 'USD 50' },
                    { label: '4th – 13th Place (×10)', value: 'USD 20 each' },

                ],

                    { resource: 'Mentors Provided', details: '2' },
                    { resource: 'Judges Provided', details: '1' },
                    { resource: 'Workshop Duration', details: '30 minutes' },
                    { resource: 'Starter Kit', details: '✅ Yes' },
                    { resource: 'Blockchain', details: 'NEAR Protocol' },

                    { resource: 'Technical Resources', details: '<a href="https://docs.ironclaw.com/" class="text-cyan" target="_blank">https://docs.ironclaw.com/</a>' },

                    { name: 'Continued Development Support', available: '✅ Yes', details: 'Champion of the group will be able to get bounties and work with me more in the NEAR ecosystem to develop ironclaw' }
                ]
            },
            'sui': {
                id: 'TRK-02',
                title: 'Sui: Agentic Finance & Unified Payments',
                color: 'purple',
                icon: 'currency_exchange',
                pool: 'USD 3,500',
                difficulty: 'Intermediate',
                problemStatement: 'Modern financial ecosystems are highly fragmented, isolating decentralized finance (DeFi), traditional payment rails, and emerging AI-driven (agentic) workflows. This disconnect causes inefficiencies, poor user experiences, and fragmented liquidity for both businesses and consumers. Legacy networks struggle to handle concurrent, high-throughput financial operations securely. Our solution creates a unified protocol bridging B2B fintech applications with robust on-chain infrastructure. By combining programmable DeFi primitives, seamless payment routing, and agentic finance where autonomous agents execute optimal yield and settlement strategies we provide a secure, low-latency financial layer designed to eliminate friction and maximize capital efficiency across all digital transactions.',
                whyThisMatters: 'Real World Solutions, as Sui provides the essential infrastructure required to make autonomous agentic finance and high-frequency DeFi a reality. Sui’s unique object-centric data model and programmable transaction blocks enable parallel execution, preventing the network congestion that typically bottlenecks legacy blockchains during complex payment routing or high-volume B2B operations. This matters because true financial innovation demands low, predictable fees, sub-second finality, and absolute security. By leveraging the inherent safety of the Move programming language, we can deploy autonomous financial agents that interact securely with decentralized markets, transforming theoretical blockchain infrastructure into scalable, everyday financial utilities for a global economy.',
                schedule: [
                    { event: 'Mentorship & Pitching Session (UTAR, Physical)', date: '22 – 25 June' },
                    { event: 'Additional Final Stage', date: 'Not required' }
                ],

                ],
                support: [

                    { resource: 'Judges Provided', details: '2' },
                    { resource: 'Workshop Duration', details: '5 hours' },
                    { resource: 'Starter Kit', details: '✅ Yes' },
                    { resource: 'Blockchain', details: 'Sui Move Language' },
                    { resource: 'Required Tools / APIs', details: 'sui.io' },
                    { resource: 'Technical Resources', details: '<a href="https://sui.io/dev" class="text-purple" target="_blank">Sui Developer Hub</a>' },
                    { resource: 'Documentation', details: '<a href="https://doc.sui.io" class="text-purple" target="_blank">doc.sui.io</a>' }

                requirements: {
                    intro: 'All three of the following must be demonstrated:',
                    minimum: [
                        '<strong>Move Smart Contracts</strong> — Deployment of secure, functional smart contracts written in Move on the Sui Testnet or Devnet to handle core financial logic.',

                        '<strong>Core Workflow Execution</strong> — Demonstration of at least one end-to-end flow, such as a routed payment transaction or a basic agentic DeFi interaction executed on-chain.'
                    ],
                    bonus: [

                        '<strong>Premium Interface:</strong> A highly polished, responsive frontend utilizing smooth, physics-based micro-interactions to elevate the standard of decentralized financial applications.',
                        '<strong>Walrus Integration:</strong> Implement MemWall'
                    ],
                    dealBreakers: [
                        '<strong>Insecure Architecture:</strong> Smart contracts that fail to compile or exhibit critical security vulnerabilities in asset handling.',
                        '<strong>Off-Chain Reliance:</strong> Faking core functionalities by relying on simulated, centralized off-chain logic instead of verifiable on-chain Move execution.',
                        '<strong>Performance Bottlenecks:</strong> Failing to leverage Sui\'s parallel execution capabilities, resulting in high latency that defeats the purpose of the network.',
                        '<strong>Broken Integration:</strong> A frontend that is fundamentally disconnected from the smart contracts or fails to route transactions successfully.'
                    ]
                },
                judging: [
                    { num: '1', criteria: 'Sui Architecture & Move Optimization', weight: '5%', desc: 'Evaluates the effective integration of unique Sui capabilities—such as Programmable Transaction Blocks (PTBs), zkLogin, or Sponsored Transactions—and the structural security of the underlying Move smart contracts.' },
                    { num: '2', criteria: 'Agentic Workflow Complexity & Execution', weight: 'TBC', desc: 'Assesses the complexity, efficiency, and functional success of the core workflow, specifically looking at how well the autonomous agents route liquidity, execute yield strategies, or settle decentralized payments on-chain.' },
                    { num: '3', criteria: 'Interface Fluidity & B2B Usability', weight: '10%', desc: 'Judges the frontend execution and overall user experience. High scores are awarded for modern styling and responsive, physics-based micro-interactions that successfully abstract the blockchain\'s complexity and make advanced financial workflows intuitive for business users.' }
                ],
                opportunities: [
                    { name: 'Internship for Winners', available: '✅ Yes', details: '' },
                    { name: 'Continued Development Support', available: '✅ Yes', details: 'Winners gain access to the <strong>Sui Developer Channel</strong> for development support' }

        };

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const trackId = urlParams.get('id') || 'near_legion'; // default to near_legion
            const track = tracksData[trackId];

            const contentContainer = document.getElementById('track-content');

            if (track) {
                // Set CSS variables for colors based on the track color
                const colorMap = {
                    'cyan': '#00f2fe',
                    'purple': '#b000ff',
                    'orange': '#ff7b00',
                    'green': '#00ff88'
                };
                const hexColor = colorMap[track.color];

                contentContainer.style.borderColor = hexColor;
                contentContainer.style.boxShadow = `0 0 20px rgba(${hexToRgb(hexColor)}, 0.1)`;

                let html = `
                    <div class="track-detail-header">
                        <div class="track-detail-icon bg-${track.color}-light text-${track.color}">
                            <span class="material-symbols-outlined" style="font-size: inherit;">${track.icon}</span>
                        </div>
                        <div>
                            <h1 class="track-detail-title text-${track.color}">${track.title}</h1>
                            <div class="track-detail-badge">${track.id}</div>
                        </div>
                    </div>

                    <div class="track-info-grid">
                        <div class="info-box">
                            <div class="info-label">Prize Pool</div>
                            <div class="info-value text-${track.color}">${track.pool}</div>
                        </div>
                        <div class="info-box">
                            <div class="info-label">Expected Difficulty</div>
                            <div class="info-value text-white">${track.difficulty}</div>
                        </div>
                        ${track.submittedBy ? `
                        <div class="info-box">
                            <div class="info-label">Submitted by</div>
                            <div class="info-value text-white">${track.submittedBy}</div>
                        </div>
                        ` : ''}
                        ${track.website ? `
                        <div class="info-box">
                            <div class="info-label">Website</div>
                            <div class="info-value text-white"><a href="${track.website}" class="text-${track.color}" target="_blank">${track.website.replace('https://', '')}</a></div>
                        </div>
                        ` : ''}
                    </div>

                    <div class="content-section-title">Problem Statement</div>
                    <p class="track-description">${track.problemStatement}</p>

                    <div class="content-section-title">Why This Matters</div>
                    <p class="track-description">${track.whyThisMatters}</p>

                    <div class="content-section-title">Schedule</div>
                    <div class="mb-8 overflow-x-auto">
                        <table style="width: 100%; text-align: left; border-collapse: collapse;">
                            <thead>
                                <tr style="border-bottom: 1px solid rgba(255,255,255,0.1);">
                                    <th style="padding: 1rem 0.5rem; color: var(--text-gray);">Event</th>
                                    <th style="padding: 1rem 0.5rem; color: var(--text-gray);">Date</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${track.schedule.map(s => `
                                <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                                    <td style="padding: 1rem 0.5rem;">${s.event}</td>
                                    <td style="padding: 1rem 0.5rem; font-weight: bold;" class="text-${track.color}">${s.date}</td>
                                </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>

                    <div class="content-section-title">Prize Pool</div>
                    <div class="track-info-grid" style="margin-top: 1rem;">
                        ${track.prizes.map((p, i) => `
                        <div class="info-box" style="${i === track.prizes.length - 1 ? `background: rgba(255, 255, 255, 0.05); border: 1px solid ${hexColor}40;` : 'background: rgba(255, 255, 255, 0.05);'}">
                            <div class="info-label ${i === track.prizes.length - 1 ? `text-${track.color}` : 'text-gray'}">${p.label}</div>
                            <div class="info-value">${p.value}</div>
                        </div>
                        `).join('')}
                    </div>

                    <div class="content-section-title mt-8">Track Support</div>
                    <div class="mb-8 overflow-x-auto">
                        <table style="width: 100%; text-align: left; border-collapse: collapse;">
                            <thead>
                                <tr style="border-bottom: 1px solid rgba(255,255,255,0.1);">
                                    <th style="padding: 1rem 0.5rem; color: var(--text-gray);">Resource</th>
                                    <th style="padding: 1rem 0.5rem; color: var(--text-gray);">Details</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${track.support.map(s => `
                                <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                                    <td style="padding: 1rem 0.5rem; color: var(--text-gray);">${s.resource}</td>
                                    <td style="padding: 1rem 0.5rem;">${s.details}</td>
                                </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>

                    <div class="content-section-title">Challenge Requirements</div>
                    ${track.requirements.intro ? `<p class="text-white mb-4">${track.requirements.intro}</p>` : ''}
                    
                    <h4 class="text-white font-bold mb-2">Minimum Requirements (Must-Have)</h4>
                    <ul class="req-list" style="color: var(--text-${track.color})">
                        ${track.requirements.minimum.map(req => `<li><span class="text-white">${req}</span></li>`).join('')}
                    </ul>

                    ${track.requirements.bonus ? `
                    <h4 class="text-white font-bold mb-2 mt-6">Bonus Features (Nice-to-Have)</h4>
                    <ul class="req-list" style="color: var(--text-${track.color})">
                        ${track.requirements.bonus.map(req => `<li><span class="text-white">${req}</span></li>`).join('')}
                    </ul>
                    ` : ''}

                    ${track.requirements.dealBreakers ? `
                    <h4 class="text-red-500 font-bold mb-2 mt-6" style="color: #ff4d4d;">Deal-Breakers (Automatic Disqualification)</h4>
                    <ul class="req-list" style="color: #ff4d4d;">
                        ${track.requirements.dealBreakers.map(req => `<li><span class="text-white">${req}</span></li>`).join('')}
                    </ul>
                    ` : ''}

                    <div class="content-section-title mt-8">Judging Criteria</div>
                    <div class="mb-8 overflow-x-auto">
                        <table style="width: 100%; text-align: left; border-collapse: collapse;">
                            <thead>
                                <tr style="border-bottom: 1px solid rgba(255,255,255,0.1);">
                                    <th style="padding: 1rem 0.5rem; color: var(--text-gray); width: 50px;">#</th>
                                    <th style="padding: 1rem 0.5rem; color: var(--text-gray);">Criteria</th>
                                    <th style="padding: 1rem 0.5rem; color: var(--text-gray); width: 100px;">Weight</th>
                                    ${track.judging[0].desc ? `<th style="padding: 1rem 0.5rem; color: var(--text-gray);">Description</th>` : ''}
                                </tr>
                            </thead>
                            <tbody>
                                ${track.judging.map(j => `
                                <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                                    <td style="padding: 1rem 0.5rem; color: var(--text-gray);">${j.num}</td>
                                    <td style="padding: 1rem 0.5rem; font-weight: bold;" class="text-${track.color}">${j.criteria}</td>
                                    <td style="padding: 1rem 0.5rem;">${j.weight}</td>
                                    ${j.desc ? `<td style="padding: 1rem 0.5rem; font-size: 0.9em; color: var(--text-gray);">${j.desc}</td>` : ''}
                                </tr>
                                `).join('')}
                            </tbody>
                        </table>

                    <div class="content-section-title">Post-Hackathon Opportunities</div>
                    <div class="mb-8 overflow-x-auto">
                        <table style="width: 100%; text-align: left; border-collapse: collapse;">
                            <thead>
                                <tr style="border-bottom: 1px solid rgba(255,255,255,0.1);">
                                    <th style="padding: 1rem 0.5rem; color: var(--text-gray);">Opportunity</th>
                                    <th style="padding: 1rem 0.5rem; color: var(--text-gray); width: 120px;">Available</th>
                                    <th style="padding: 1rem 0.5rem; color: var(--text-gray);">Details</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${track.opportunities.map(o => `
                                <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                                    <td style="padding: 1rem 0.5rem;">${o.name}</td>
                                    <td style="padding: 1rem 0.5rem;">${o.available}</td>
                                    <td style="padding: 1rem 0.5rem; font-size: 0.9em; color: var(--text-gray);">${o.details}</td>
                                </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;

                contentContainer.innerHTML = html;
            } else {
                contentContainer.innerHTML = `
                    <div class="text-center py-12">
                        <span class="material-symbols-outlined text-4xl mb-4 text-orange">error</span>
                        <h2 class="text-2xl font-bold mb-4">Track Not Found</h2>
                        <p class="text-gray mb-8">The track you are looking for does not exist or has been removed.</p>
                        <a href="index.html#tracks" class="btn btn-primary">Return to Tracks</a>
                    </div>
                `;
            }
        });

        // Helper function to convert hex to rgb for rgba usage
        function hexToRgb(hex) {
            const shorthandRegex = /^#?([a-f\d])([a-f\d])([a-f\d])$/i;
            hex = hex.replace(shorthandRegex, (m, r, g, b) => {
                return r + r + g + g + b + b;
            });
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? 
                parseInt(result[1], 16) + ', ' + parseInt(result[2], 16) + ', ' + parseInt(result[3], 16) 
                : '255, 255, 255';
        }
    </script>
</body>
