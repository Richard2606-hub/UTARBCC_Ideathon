<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Details - CCACC Ideathon</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- Material Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
    <style>
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            color: var(--text-gray);
            text-decoration: none;
            font-family: 'Space Grotesk', sans-serif;
            transition: color 0.3s ease;
        }
        .back-btn:hover {
            color: var(--text-light);
        }
        .track-detail-card {
            padding: 3rem;
            border-radius: 1rem;
            background: rgba(26, 26, 36, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            margin-bottom: 4rem;
        }
        .track-detail-header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .track-detail-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }
        .track-detail-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
        }
        .track-detail-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            background: rgba(255, 255, 255, 0.1);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: inline-block;
        }
        .track-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .info-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 1.5rem;
            border-radius: 0.75rem;
        }
        .info-label {
            font-size: 0.875rem;
            color: var(--text-gray);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .info-value {
            font-size: 1.25rem;
            font-weight: 600;
            font-family: 'Space Grotesk', sans-serif;
        }
        .track-description {
            font-size: 1.125rem;
            line-height: 1.7;
            color: var(--text-gray);
            margin-bottom: 2rem;
        }
        .req-list {
            list-style: none;
            padding: 0;
            margin: 0 0 2rem 0;
        }
        .req-list li {
            position: relative;
            padding-left: 1.5rem;
            margin-bottom: 0.75rem;
            color: var(--text-light);
        }
        .req-list li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: currentColor;
        }
        .content-section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--text-light);
        }
    </style>
</head>
<body>
    <!-- Background Elements -->
    <div class="bg-effects">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="grid-overlay"></div>
    </div>

    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">CCACC <span class="highlight">Ideathon</span></a>
            <div class="nav-links">
                <a href="index.html#home" class="nav-link">Home</a>
                <a href="index.html#tracks" class="nav-link active">Tracks</a>
            </div>
            <a href="https://forms.gle/vx3ffcEMEkRuwkrT7" class="btn btn-primary nav-btn" target="_blank" rel="noopener noreferrer">Register Now</a>
        </div>
    </nav>

    <main class="section-padding" style="margin-top: 80px; min-height: 80vh;">
        <div class="container max-w-4xl">
            <a href="javascript:history.back()" class="back-btn">
                <span class="material-symbols-outlined">arrow_back</span> Back to Tracks
            </a>
            
            <div id="track-content" class="track-detail-card reveal">
                <!-- Content will be loaded dynamically -->
                <div class="text-center py-12">
                    <span class="material-symbols-outlined text-4xl mb-4 text-cyan" style="animation: spin 1s linear infinite;">refresh</span>
                    <p>Loading track details...</p>
                </div>
            </div>
        </div>
    </main>
    
    <style>
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>

    <!-- Footer -->
    <footer>
        <div class="container footer-container">
            <div class="copyright text-sm text-gray font-mono">
                © CCACC Ideathon · UNIVERSITI TUNKU ABDUL RAHMAN BLOCKCHAIN CLUB
            </div>
            <div class="social-links">
                <a href="https://www.instagram.com/utar.blockchainclub?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank" class="social-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"></line></svg>
                </a>
            </div>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="script.js"></script>
    
    <script>
        const tracksData = {
            'stablecoins': {
                id: 'TRK-01',
                title: 'Stablecoins',
                theme: 'Next-Gen Stability',
                color: 'cyan',
                icon: 'payments',
                pool: '1,500 USDT',
                organiser: 'MUBA',
                desc: 'Build stable and reliable cryptocurrency solutions pegged to real-world assets or algorithmic models. We are looking for innovative approaches to maintain peg stability during high market volatility, capital-efficient minting/burning mechanisms, and cross-chain stablecoin solutions that reduce fragmentation.',
                projectTypes: [
                    'Fiat-backed tokens with proof of reserves',
                    'Algorithmic stablecoins with novel stability mechanisms',
                    'Cross-chain stability mechanisms and liquidity routing',
                    'Yield-bearing stablecoins'
                ],
                requirements: 'Working prototype deployed on testnet, open-source smart contract repository, and a presentation deck detailing the economic model. Universal criteria require code to compile without errors, successful deployment to testnet, core functionality works as demonstrated, code is readable and documented, proper error handling, and the GitHub repository is organized.',
                prizes: {
                    first: '750 USDT',
                    second: '500 USDT',
                    third: '250 USDT'
                }
            },
            'defi': {
                id: 'TRK-02',
                title: 'DeFi',
                theme: 'Decentralised Finance',
                color: 'purple',
                icon: 'currency_exchange',
                pool: '1,500 USDT',
                organiser: 'MUBA',
                desc: 'Design decentralised financial instruments, AMMs, lending protocols, and more. This track challenges you to rethink traditional finance and build capital-efficient, composable, and secure financial legos. Focus on solving real DeFi problems like impermanent loss, liquidity fragmentation, or high collateralization ratios.',
                projectTypes: [
                    'Lending & Borrowing protocols with dynamic interest rates',
                    'Automated Market Makers (AMMs) and DEX aggregators',
                    'Yield Aggregators and auto-compounding vaults',
                    'Derivatives and synthetic asset platforms'
                ],
                requirements: 'Working prototype deployed on testnet, open-source smart contract repository, and a presentation deck detailing the architecture. Universal criteria require code to compile without errors, successful deployment to testnet, core functionality works as demonstrated, code is readable and documented, proper error handling, and the GitHub repository is organized.',
                prizes: {
                    first: '750 USDT',
                    second: '500 USDT',
                    third: '250 USDT'
                }
            },
            'ai': {
                id: 'TRK-03',
                title: 'AI',
                theme: 'Intelligent Web3',
                color: 'orange',
                icon: 'psychology',
                pool: '1,500 USDT',
                organiser: 'MUBA',
                desc: 'Combine Artificial Intelligence with Blockchain to create smart, decentralized applications. Explore the intersection of these two transformative technologies by building applications that utilize on-chain AI models, decentralized data marketplaces for AI training, or AI agents that interact with smart contracts autonomously.',
                projectTypes: [
                    'AI Trading Bots and portfolio managers',
                    'Predictive Models for market analytics or risk assessment',
                    'Generative AI NFTs and dynamic digital assets',
                    'Decentralized AI model training and validation'
                ],
                requirements: 'Working prototype demonstrating AI/Blockchain integration, smart contract repository, and a presentation deck. Universal criteria require code to compile without errors, successful deployment to testnet, core functionality works as demonstrated, code is readable and documented, proper error handling, and the GitHub repository is organized.',
                prizes: {
                    first: '750 USDT',
                    second: '500 USDT',
                    third: '250 USDT'
                }
            },
            'infrastructure': {
                id: 'TRK-04',
                title: 'Infrastructure',
                theme: 'Web3 Foundations',
                color: 'green',
                icon: 'dns',
                pool: '1,500 USDT',
                organiser: 'MUBA',
                desc: 'Build tools, protocols, and foundational layers to scale the Web3 ecosystem. The focus is on improving the developer experience, enhancing blockchain scalability, and providing robust infrastructure that other decentralized applications can rely on. Help solve the core technical bottlenecks of current blockchain networks.',
                projectTypes: [
                    'Layer 2 Solutions and scaling mechanisms',
                    'Developer Tooling (SDKs, APIs, indexing solutions)',
                    'Data Availability and decentralized storage',
                    'Cross-chain bridges and interoperability protocols'
                ],
                requirements: 'Working prototype or proof of concept, comprehensive documentation, smart contract/code repository, and a presentation deck. Universal criteria require code to compile without errors, successful deployment to testnet, core functionality works as demonstrated, code is readable and documented, proper error handling, and the GitHub repository is organized.',
                prizes: {
                    first: '750 USDT',
                    second: '500 USDT',
                    third: '250 USDT'
                }
            },
            'consumer': {
                id: 'TRK-05',
                title: 'Consumer Apps',
                theme: 'Mass Adoption',
                color: 'cyan',
                icon: 'smartphone',
                pool: '1,500 USDT',
                organiser: 'MUBA',
                desc: 'Create engaging decentralized applications tailored for everyday users. Break down the barriers to entry in Web3 by building intuitive, user-friendly applications that abstract away wallet complexity and gas fees. We want to see applications that have the potential to onboard the next million users into the Web3 space.',
                projectTypes: [
                    'SocialFi applications and decentralized social networks',
                    'Web3 Gaming with sustainable tokenomics',
                    'NFT Marketplaces and digital collectibles platforms',
                    'Digital Identity and credential verification systems'
                ],
                requirements: 'Working prototype with polished UI/UX, smart contract repository, and a presentation deck emphasizing user acquisition strategy. Universal criteria require code to compile without errors, successful deployment to testnet, core functionality works as demonstrated, code is readable and documented, proper error handling, and the GitHub repository is organized.',
                prizes: {
                    first: '750 USDT',
                    second: '500 USDT',
                    third: '250 USDT'
                }
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const trackId = urlParams.get('id') || 'stablecoins'; // default to stablecoins
            const track = tracksData[trackId];

            const contentContainer = document.getElementById('track-content');

            if (track) {
                // Set CSS variables for colors based on the track color
                const colorMap = {
                    'cyan': '#00f2fe',
                    'purple': '#b000ff',
                    'orange': '#ff7b00',
                    'green': '#00ff88'
                };
                const hexColor = colorMap[track.color];

                contentContainer.style.borderColor = hexColor;
                contentContainer.style.boxShadow = `0 0 20px rgba(${hexToRgb(hexColor)}, 0.1)`;

                contentContainer.innerHTML = `
                    <div class="track-detail-header">
                        <div class="track-detail-icon bg-${track.color}-light text-${track.color}">
                            <span class="material-symbols-outlined" style="font-size: inherit;">${track.icon}</span>
                        </div>
                        <div>
                            <h1 class="track-detail-title text-${track.color}">${track.title}</h1>
                            <div class="track-detail-badge">${track.id}</div>
                        </div>
                    </div>

                    <div class="track-info-grid">
                        <div class="info-box">
                            <div class="info-label">Prize Pool</div>
                            <div class="info-value text-${track.color}">${track.pool}</div>
                        </div>
                        <div class="info-box">
                            <div class="info-label">Theme</div>
                            <div class="info-value text-white">${track.theme}</div>
                        </div>
                        <div class="info-box">
                            <div class="info-label">Organiser</div>
                            <div class="info-value text-white">${track.organiser}</div>
                        </div>
                    </div>

                    <div class="content-section-title">Overview</div>
                    <p class="track-description">${track.desc}</p>

                    <div class="content-section-title">Project Types</div>
                    <ul class="req-list" style="color: var(--text-${track.color})">
                        ${track.projectTypes.map(type => `<li><span class="text-white">${type}</span></li>`).join('')}
                    </ul>

                    <div class="content-section-title">Prize Distribution</div>
                    <div class="track-info-grid" style="margin-top: 1rem;">
                        <div class="info-box" style="background: rgba(255, 255, 255, 0.05); border: 1px solid ${hexColor}40;">
                            <div class="info-label text-${track.color}">1st Place</div>
                            <div class="info-value">${track.prizes.first}</div>
                        </div>
                        <div class="info-box" style="background: rgba(255, 255, 255, 0.05);">
                            <div class="info-label text-gray">2nd Place</div>
                            <div class="info-value">${track.prizes.second}</div>
                        </div>
                        <div class="info-box" style="background: rgba(255, 255, 255, 0.05);">
                            <div class="info-label text-gray">3rd Place</div>
                            <div class="info-value">${track.prizes.third}</div>
                        </div>
                    </div>

                    <div class="content-section-title mt-8">Requirements</div>
                    <div class="info-box border-l-4" style="border-left: 4px solid ${hexColor};">
                        <p class="text-white">${track.requirements}</p>
                    </div>
                    
                    <div class="info-box mt-4" style="background: rgba(255, 255, 255, 0.05); border: 1px dashed ${hexColor}80;">
                        <p class="text-gray text-sm"><strong>Note on Judging:</strong> 20% of your total judging score will be explicitly based on <span class="text-${track.color}">Track-Specific Technical Implementations</span> as defined by the track sponsor.</p>
                    </div>
                `;
            } else {
                contentContainer.innerHTML = `
                    <div class="text-center py-12">
                        <span class="material-symbols-outlined text-4xl mb-4 text-orange">error</span>
                        <h2 class="text-2xl font-bold mb-4">Track Not Found</h2>
                        <p class="text-gray mb-8">The track you are looking for does not exist or has been removed.</p>
                        <a href="index.html#tracks" class="btn btn-primary">Return to Tracks</a>
                    </div>
                `;
            }
        });

        // Helper function to convert hex to rgb for rgba usage
        function hexToRgb(hex) {
            const shorthandRegex = /^#?([a-f\d])([a-f\d])([a-f\d])$/i;
            hex = hex.replace(shorthandRegex, (m, r, g, b) => {
                return r + r + g + g + b + b;
            });
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? 
                parseInt(result[1], 16) + ', ' + parseInt(result[2], 16) + ', ' + parseInt(result[3], 16) 
                : '255, 255, 255';
        }
    </script>
</body>
</html>
